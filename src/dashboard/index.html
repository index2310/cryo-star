<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unhedged AI Bot — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --border: #2a2a4a;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --accent-green: #00e676;
      --accent-green-dim: #00c85340;
      --accent-red: #ff5252;
      --accent-red-dim: #ff525240;
      --accent-blue: #448aff;
      --accent-purple: #b388ff;
      --accent-gold: #ffd740;
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #00e676 0%, #00c853 100%);
      --gradient-3: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-blue);
    }

    .stat-card .label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-card .value.green { color: var(--accent-green); }
    .stat-card .value.red { color: var(--accent-red); }
    .stat-card .value.blue { color: var(--accent-blue); }
    .stat-card .value.gold { color: var(--accent-gold); }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trades-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg-secondary);
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
    }

    tr:hover td {
      background: var(--bg-card-hover);
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge.yes {
      background: var(--accent-green-dim);
      color: var(--accent-green);
    }

    .badge.no {
      background: var(--accent-red-dim);
      color: var(--accent-red);
    }

    .badge.strong {
      background: linear-gradient(135deg, rgba(0,230,118,0.2), rgba(0,200,83,0.3));
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }

    .badge.skip {
      background: rgba(136,136,160,0.2);
      color: var(--text-secondary);
    }

    .live-signals {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .signal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .signal-item:last-child { border-bottom: none; }

    .signal-info {
      flex: 1;
    }

    .signal-info .title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .signal-info .meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .signal-action {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .confidence-bar {
      width: 100px;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }

    .confidence-bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Unhedged AI Bot</h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="container">
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Total Signals</div>
        <div class="value blue" id="totalSignals">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Bets Placed</div>
        <div class="value" id="totalTrades">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Win Rate</div>
        <div class="value green" id="winRate">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Profit</div>
        <div class="value gold" id="totalProfit">0 CC</div>
      </div>
      <div class="stat-card">
        <div class="label">Wins / Losses</div>
        <div class="value" id="winLoss">0 / 0</div>
      </div>
      <div class="stat-card">
        <div class="label">Bot Mode</div>
        <div class="value" id="botMode" style="font-size: 18px">-</div>
      </div>
    </div>

    <!-- Live Signals -->
    <div class="section-title">⚡ Live Signals</div>
    <div class="live-signals" id="liveSignals">
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>Waiting for signals...</p>
      </div>
    </div>

    <br>

    <!-- Recent Trades -->
    <div class="section-title">📋 Recent Trades</div>
    <div class="trades-table">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Market</th>
            <th>Prediction</th>
            <th>Confidence</th>
            <th>Edge</th>
            <th>Action</th>
            <th>Amount</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="tradesBody">
          <tr>
            <td colspan="8" style="text-align: center; color: var(--text-secondary); padding: 40px;">
              No trades yet. Bot is scanning markets...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${window.location.host}/ws`;
    let ws;

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById('statusDot').style.background = '#00e676';
        document.getElementById('statusText').textContent = 'Connected';
      };

      ws.onclose = () => {
        document.getElementById('statusDot').style.background = '#ff5252';
        document.getElementById('statusText').textContent = 'Disconnected — Reconnecting...';
        setTimeout(connect, 3000);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'stats') updateStats(data.payload);
        if (data.type === 'signal') addSignal(data.payload);
        if (data.type === 'trades') updateTrades(data.payload);
        if (data.type === 'mode') document.getElementById('botMode').textContent = data.payload;
      };
    }

    function updateStats(stats) {
      document.getElementById('totalSignals').textContent = stats.totalSignals || 0;
      document.getElementById('totalTrades').textContent = stats.totalTrades || 0;
      document.getElementById('winRate').textContent = stats.winRate || '-';
      document.getElementById('totalProfit').textContent = (stats.totalProfit || 0).toFixed(2) + ' CC';
      document.getElementById('winLoss').textContent = `${stats.wins || 0} / ${stats.losses || 0}`;

      const profitEl = document.getElementById('totalProfit');
      profitEl.className = 'value ' + ((stats.totalProfit || 0) >= 0 ? 'green' : 'red');
    }

    function addSignal(signal) {
      const container = document.getElementById('liveSignals');
      if (container.querySelector('.empty-state')) container.innerHTML = '';

      const item = document.createElement('div');
      item.className = 'signal-item';
      item.innerHTML = `
        <div class="signal-info">
          <div class="title">${signal.market}</div>
          <div class="meta">Edge: ${signal.edge}% | Kelly: ${signal.kellyFraction}%</div>
        </div>
        <div class="signal-action">
          <span class="badge ${signal.prediction === 'YES' ? 'yes' : 'no'}">${signal.prediction}</span>
          <div>
            <div class="confidence-bar">
              <div class="fill" style="width: ${signal.confidence}%; background: ${signal.confidence >= 70 ? '#00e676' : '#ffd740'}"></div>
            </div>
            <div style="font-size: 11px; color: #8888a0; margin-top: 2px">${signal.confidence}%</div>
          </div>
          <span class="badge ${signal.recommendation === 'STRONG_BET' ? 'strong' : signal.recommendation === 'SKIP' ? 'skip' : ''}">${signal.recommendation}</span>
        </div>
      `;

      container.insertBefore(item, container.firstChild);

      // Keep max 20 signals
      while (container.children.length > 20) container.removeChild(container.lastChild);
    }

    function updateTrades(trades) {
      const tbody = document.getElementById('tradesBody');
      if (!trades.length) return;

      tbody.innerHTML = trades.map(t => `
        <tr>
          <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
          <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">${t.market_title}</td>
          <td><span class="badge ${t.prediction === 'YES' ? 'yes' : 'no'}">${t.prediction}</span></td>
          <td>${t.confidence?.toFixed(0)}%</td>
          <td style="color: ${t.edge > 0 ? '#00e676' : '#ff5252'}">${t.edge?.toFixed(1)}%</td>
          <td><span class="badge ${t.recommendation === 'STRONG_BET' ? 'strong' : 'skip'}">${t.recommendation || '-'}</span></td>
          <td>${t.bet_placed ? t.bet_amount + ' CC' : '-'}</td>
          <td>${t.outcome || (t.dry_run ? '🔵 Dry Run' : '⏳')}</td>
        </tr>
      `).join('');
    }

    connect();
  </script>
</body>
</html>
